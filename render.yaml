services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: bank-statement-agent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: LOG_LEVEL
        value: INFO
      - key: CHROMA_PERSIST_DIR
        value: ./.chroma
      # Set these in the Render dashboard — do NOT commit real keys
      - key: GOOGLE_API_KEYS
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: CEREBRAS_API_KEYS
        sync: false
      - key: ANTHROPIC_API_KEYS
        sync: false

  # ── Frontend (Next.js static export) ────────────────────────────────────────
  - type: web
    name: bank-statement-agent-ui
    runtime: static
    buildCommand: cd ui && npm install && npm run build
    staticPublishPath: ui/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # Set to your backend URL: https://bank-statement-agent-api.onrender.com
